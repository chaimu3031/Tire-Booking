<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SWAPYYC — Seasonal Tire Change Booking</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=JetBrains+Mono:wght@400;500;700&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0d0d;
    --bg-2: #161513;
    --panel: #1c1a17;
    --ink: #f4f1ea;
    --ink-dim: #8a8680;
    --ink-faint: #4a4742;
    --rule: #2a2826;
    --accent: #ff5722;
    --accent-deep: #c43d10;
    --warning: #fbbf24;
    --ok: #65d472;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    background: var(--bg);
    color: var(--ink);
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    font-size: 14px;
    line-height: 1.5;
    overflow-x: hidden;
    min-height: 100vh;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: radial-gradient(circle at 1px 1px, rgba(255,255,255,0.022) 1px, transparent 0);
    background-size: 22px 22px;
    pointer-events: none;
    z-index: 0;
  }

  header {
    position: relative;
    z-index: 10;
    padding: 22px 40px;
    border-bottom: 1px solid var(--rule);
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: var(--bg);
  }

  .brand {
    display: flex;
    align-items: center;
    gap: 14px;
    font-family: 'Archivo Black', sans-serif;
    font-size: 20px;
    letter-spacing: 0.04em;
  }
  .brand-mark {
    width: 32px; height: 32px;
    border-radius: 50%;
    border: 3px solid var(--ink);
    position: relative;
  }
  .brand-mark::before {
    content: '';
    position: absolute;
    inset: 5px;
    border-radius: 50%;
    border: 2px solid var(--accent);
  }
  .brand-mark::after {
    content: '';
    position: absolute;
    inset: 12px;
    background: var(--ink);
    border-radius: 50%;
  }
  .brand-tag {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--ink-dim);
    letter-spacing: 0.15em;
    margin-left: 6px;
    border-left: 1px solid var(--rule);
    padding-left: 14px;
  }

  .header-meta {
    display: flex;
    gap: 32px;
    font-size: 11px;
    letter-spacing: 0.1em;
    color: var(--ink-dim);
    text-transform: uppercase;
  }
  .header-meta span b {
    color: var(--ink);
    font-weight: 500;
    margin-left: 6px;
  }

  .app {
    position: relative;
    z-index: 1;
    display: grid;
    grid-template-columns: 1fr 380px;
    min-height: calc(100vh - 73px);
  }

  main {
    padding: 56px 64px 80px;
    position: relative;
    border-right: 1px solid var(--rule);
  }

  aside {
    background: var(--bg-2);
    padding: 56px 40px;
    position: sticky;
    top: 73px;
    height: calc(100vh - 73px);
    overflow-y: auto;
  }

  .stepper {
    display: flex;
    gap: 0;
    margin-bottom: 56px;
    border: 1px solid var(--rule);
  }
  .step-pill {
    flex: 1;
    padding: 14px 18px;
    border-right: 1px solid var(--rule);
    display: flex;
    align-items: center;
    gap: 12px;
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--ink-faint);
    transition: all .3s;
    background: var(--bg);
  }
  .step-pill:last-child { border-right: none; }
  .step-pill.active {
    background: var(--accent);
    color: var(--bg);
  }
  .step-pill.done {
    color: var(--ink);
    background: var(--bg);
  }
  .step-num {
    font-family: 'Archivo Black', sans-serif;
    font-size: 13px;
    width: 24px; height: 24px;
    border-radius: 50%;
    background: var(--bg-2);
    color: var(--ink);
    display: grid;
    place-items: center;
    flex-shrink: 0;
  }
  .step-pill.active .step-num {
    background: var(--bg);
    color: var(--accent);
  }
  .step-pill.done .step-num {
    background: var(--ok);
    color: var(--bg);
  }
  .step-pill.done .step-num::before { content: '✓'; }
  .step-pill.done .step-num span { display: none; }

  .section-head {
    margin-bottom: 36px;
  }
  .section-kicker {
    font-size: 11px;
    letter-spacing: 0.2em;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .section-kicker::before {
    content: '';
    width: 24px;
    height: 1px;
    background: var(--accent);
  }
  .section-title {
    font-family: 'Archivo Black', sans-serif;
    font-size: clamp(40px, 5.5vw, 72px);
    line-height: 0.95;
    letter-spacing: -0.02em;
    text-transform: uppercase;
    margin-bottom: 18px;
  }
  .section-title em {
    font-family: 'Instrument Serif', serif;
    font-style: italic;
    font-weight: 400;
    color: var(--accent);
    text-transform: lowercase;
    letter-spacing: -0.01em;
  }
  .section-sub {
    color: var(--ink-dim);
    font-size: 13px;
    max-width: 540px;
    line-height: 1.6;
  }

  .service-card {
    background: var(--panel);
    border: 1px solid var(--rule);
    padding: 40px;
    cursor: pointer;
    transition: all .25s;
    position: relative;
    overflow: hidden;
    max-width: 720px;
  }
  .service-card:hover, .service-card.selected {
    border-color: var(--accent);
  }
  .service-card.selected::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(255,87,34,0.06), transparent 60%);
    pointer-events: none;
  }
  .service-card.selected::after {
    content: 'SELECTED';
    position: absolute;
    top: 18px; right: 18px;
    font-size: 10px;
    letter-spacing: 0.15em;
    color: var(--accent);
    padding: 4px 10px;
    border: 1px solid var(--accent);
  }

  .service-head {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 30px;
    margin-bottom: 22px;
  }
  .service-title {
    font-family: 'Archivo Black', sans-serif;
    font-size: 28px;
    line-height: 1.05;
    text-transform: uppercase;
    letter-spacing: -0.01em;
  }
  .service-price {
    font-family: 'Archivo Black', sans-serif;
    font-size: 32px;
    color: var(--accent);
    white-space: nowrap;
  }
  .service-price small {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--ink-dim);
    display: block;
    text-align: right;
    margin-top: 4px;
    font-weight: 400;
    letter-spacing: 0.1em;
  }
  .service-desc {
    color: var(--ink-dim);
    font-size: 13px;
    margin-bottom: 24px;
    max-width: 480px;
  }
  .service-bullets {
    list-style: none;
    display: grid;
    gap: 8px;
    padding-top: 22px;
    border-top: 1px dashed var(--rule);
  }
  .service-bullets li {
    font-size: 12px;
    color: var(--ink);
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .service-bullets li::before {
    content: '◇';
    color: var(--accent);
  }
  .requirement-banner {
    margin-top: 28px;
    padding: 14px 18px;
    background: rgba(251, 191, 36, 0.08);
    border-left: 3px solid var(--warning);
    font-size: 12px;
    color: var(--ink);
    max-width: 720px;
  }
  .requirement-banner b {
    color: var(--warning);
    letter-spacing: 0.05em;
  }

  .city-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
    max-width: 720px;
  }
  .city-card {
    background: var(--panel);
    border: 1px solid var(--rule);
    padding: 28px;
    cursor: pointer;
    transition: all .2s;
    position: relative;
  }
  .city-card.available:hover, .city-card.selected {
    border-color: var(--accent);
  }
  .city-card.selected {
    background: linear-gradient(135deg, rgba(255,87,34,0.06), transparent);
  }
  .city-card.unavailable {
    opacity: 0.45;
    cursor: not-allowed;
  }
  .city-name {
    font-family: 'Archivo Black', sans-serif;
    font-size: 22px;
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  .city-prov {
    font-size: 11px;
    color: var(--ink-dim);
    letter-spacing: 0.1em;
    margin-bottom: 16px;
    text-transform: uppercase;
  }
  .city-status {
    font-size: 10px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    display: inline-block;
    padding: 4px 10px;
    border: 1px solid currentColor;
  }
  .city-card.available .city-status { color: var(--ok); }
  .city-card.unavailable .city-status { color: var(--ink-dim); }
  .city-card.selected .city-status { color: var(--accent); border-color: var(--accent); }

  .datetime-wrap {
    display: grid;
    grid-template-columns: 1.1fr 1fr;
    gap: 48px;
    max-width: 900px;
  }
  .cal-head {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 22px;
  }
  .cal-month {
    font-family: 'Archivo Black', sans-serif;
    font-size: 24px;
    text-transform: uppercase;
    letter-spacing: 0.02em;
  }
  .cal-nav {
    display: flex;
    gap: 8px;
  }
  .cal-nav button {
    background: var(--panel);
    border: 1px solid var(--rule);
    color: var(--ink);
    width: 36px; height: 36px;
    cursor: pointer;
    font-family: inherit;
    font-size: 14px;
    transition: all .15s;
  }
  .cal-nav button:hover { border-color: var(--accent); color: var(--accent); }

  .cal-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 4px;
  }
  .cal-dow {
    text-align: center;
    font-size: 10px;
    color: var(--ink-dim);
    letter-spacing: 0.15em;
    padding: 8px 0;
  }
  .cal-day {
    aspect-ratio: 1;
    border: 1px solid var(--rule);
    background: var(--panel);
    display: grid;
    place-items: center;
    cursor: pointer;
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px;
    color: var(--ink);
    transition: all .15s;
    position: relative;
  }
  .cal-day:hover:not(.disabled):not(.empty) {
    border-color: var(--accent);
    color: var(--accent);
  }
  .cal-day.selected {
    background: var(--accent);
    color: var(--bg);
    border-color: var(--accent);
    font-weight: 700;
  }
  .cal-day.today::after {
    content: '';
    position: absolute;
    bottom: 5px; left: 50%;
    transform: translateX(-50%);
    width: 4px; height: 4px;
    background: var(--accent);
    border-radius: 50%;
  }
  .cal-day.selected.today::after { background: var(--bg); }
  .cal-day.disabled {
    color: var(--ink-faint);
    cursor: not-allowed;
    background: transparent;
    border-color: transparent;
  }
  .cal-day.empty {
    border: none;
    background: transparent;
    cursor: default;
  }
  .cal-day.weekend {
    background: rgba(255,87,34,0.04);
  }

  .timeslots {
    display: flex;
    flex-direction: column;
  }
  .timeslot-head {
    font-size: 11px;
    letter-spacing: 0.15em;
    color: var(--ink-dim);
    text-transform: uppercase;
    margin-bottom: 18px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .timeslot-head span.day-label {
    color: var(--accent);
  }
  .timeslot-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }
  .no-date {
    color: var(--ink-faint);
    font-size: 12px;
    padding: 32px;
    border: 1px dashed var(--rule);
    text-align: center;
  }
  .slot {
    background: var(--panel);
    border: 1px solid var(--rule);
    padding: 14px 16px;
    cursor: pointer;
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px;
    color: var(--ink);
    text-align: left;
    transition: all .15s;
    position: relative;
  }
  .slot:hover:not(.taken):not(.blocked) {
    border-color: var(--accent);
    color: var(--accent);
  }
  .slot.selected {
    background: var(--accent);
    color: var(--bg);
    border-color: var(--accent);
    font-weight: 700;
  }
  .slot small {
    display: block;
    font-size: 10px;
    color: var(--ink-dim);
    letter-spacing: 0.1em;
    margin-top: 2px;
  }
  .slot.selected small { color: rgba(13,13,13,0.7); }
  .slot.taken, .slot.blocked {
    opacity: 0.35;
    cursor: not-allowed;
    text-decoration: line-through;
  }
  .lunch-note {
    margin-top: 16px;
    padding: 12px 14px;
    background: rgba(251, 191, 36, 0.06);
    border-left: 2px solid var(--warning);
    font-size: 11px;
    color: var(--ink-dim);
    line-height: 1.6;
  }

  .form-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    max-width: 720px;
  }
  .field { display: flex; flex-direction: column; gap: 8px; }
  .field.full { grid-column: 1 / -1; }
  .field label {
    font-size: 10px;
    letter-spacing: 0.2em;
    color: var(--ink-dim);
    text-transform: uppercase;
  }
  .field input {
    background: var(--panel);
    border: 1px solid var(--rule);
    padding: 14px 16px;
    color: var(--ink);
    font-family: inherit;
    font-size: 14px;
    transition: border-color .15s;
  }
  .field input:focus {
    outline: none;
    border-color: var(--accent);
  }
  .field input::placeholder { color: var(--ink-faint); }
  .vehicle-row {
    grid-column: 1 / -1;
    display: grid;
    grid-template-columns: 1.5fr 1.5fr 0.8fr;
    gap: 12px;
  }

  .pay-wrap {
    max-width: 540px;
  }
  .pay-card {
    background: var(--panel);
    border: 1px solid var(--rule);
    padding: 32px;
    margin-bottom: 24px;
  }
  .stripe-badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-size: 10px;
    letter-spacing: 0.15em;
    color: var(--ink-dim);
    margin-bottom: 24px;
    text-transform: uppercase;
  }
  .stripe-badge::before {
    content: '🔒';
    font-size: 12px;
  }
  .card-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-top: 16px;
  }

  .actions {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 56px;
    max-width: 900px;
  }
  .btn {
    font-family: 'Archivo Black', sans-serif;
    font-size: 13px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 18px 36px;
    border: none;
    cursor: pointer;
    transition: all .2s;
    font-weight: 900;
  }
  .btn-primary {
    background: var(--accent);
    color: var(--bg);
  }
  .btn-primary:hover:not(:disabled) {
    background: var(--ink);
  }
  .btn-primary:disabled {
    background: var(--rule);
    color: var(--ink-faint);
    cursor: not-allowed;
  }
  .btn-ghost {
    background: transparent;
    color: var(--ink-dim);
    border: 1px solid var(--rule);
  }
  .btn-ghost:hover {
    color: var(--ink);
    border-color: var(--ink);
  }

  .aside-title {
    font-size: 11px;
    letter-spacing: 0.2em;
    color: var(--ink-dim);
    text-transform: uppercase;
    margin-bottom: 22px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .aside-title::before {
    content: '';
    width: 6px; height: 6px;
    background: var(--accent);
    display: inline-block;
    border-radius: 50%;
  }
  .summary-block {
    margin-bottom: 26px;
    padding-bottom: 26px;
    border-bottom: 1px dashed var(--rule);
  }
  .summary-block:last-of-type { border-bottom: none; }
  .summary-label {
    font-size: 10px;
    color: var(--ink-dim);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  .summary-val {
    font-family: 'Archivo Black', sans-serif;
    font-size: 18px;
    line-height: 1.2;
    text-transform: uppercase;
  }
  .summary-val.empty {
    font-family: 'Instrument Serif', serif;
    font-style: italic;
    font-weight: 400;
    color: var(--ink-faint);
    text-transform: lowercase;
    font-size: 16px;
  }
  .summary-val small {
    display: block;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--ink-dim);
    text-transform: none;
    letter-spacing: 0;
    margin-top: 4px;
    font-weight: 400;
  }

  .price-block {
    margin-top: 28px;
    padding-top: 24px;
    border-top: 2px solid var(--ink);
  }
  .price-row {
    display: flex;
    justify-content: space-between;
    margin-bottom: 8px;
    font-size: 12px;
    color: var(--ink-dim);
  }
  .price-total {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-top: 14px;
  }
  .price-total .label {
    font-size: 11px;
    letter-spacing: 0.15em;
    color: var(--ink);
    text-transform: uppercase;
  }
  .price-total .amount {
    font-family: 'Archivo Black', sans-serif;
    font-size: 32px;
    color: var(--accent);
  }

  .success-screen {
    text-align: center;
    padding: 80px 40px;
    max-width: 640px;
    margin: 0 auto;
  }
  .success-mark {
    width: 80px; height: 80px;
    border: 3px solid var(--ok);
    border-radius: 50%;
    display: grid;
    place-items: center;
    margin: 0 auto 32px;
    font-size: 36px;
    color: var(--ok);
    animation: pop .5s cubic-bezier(.2,1.4,.5,1);
  }
  @keyframes pop { 0% { transform: scale(0); } 100% { transform: scale(1); } }
  .success-screen h1 {
    font-family: 'Archivo Black', sans-serif;
    font-size: 48px;
    text-transform: uppercase;
    line-height: 0.95;
    margin-bottom: 20px;
  }
  .success-screen h1 em {
    font-family: 'Instrument Serif', serif;
    font-style: italic;
    color: var(--accent);
    font-weight: 400;
    text-transform: lowercase;
  }
  .confirm-code {
    display: inline-block;
    padding: 10px 18px;
    border: 1px dashed var(--accent);
    margin-top: 18px;
    font-size: 13px;
    letter-spacing: 0.15em;
    color: var(--accent);
  }

  .step-content {
    animation: fade-in .4s ease-out;
  }
  @keyframes fade-in {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @media (max-width: 1080px) {
    .app { grid-template-columns: 1fr; }
    aside {
      position: relative;
      top: 0;
      height: auto;
      border-top: 1px solid var(--rule);
    }
    main { padding: 40px 28px 60px; border-right: none; }
    header { padding: 18px 24px; }
    .header-meta { display: none; }
    .datetime-wrap { grid-template-columns: 1fr; gap: 32px; }
    .city-grid { grid-template-columns: 1fr 1fr; }
    .form-grid { grid-template-columns: 1fr; }
    .vehicle-row { grid-template-columns: 1fr; }
    .card-row { grid-template-columns: 1fr; }
  }
  @media (max-width: 560px) {
    .stepper { flex-direction: column; }
    .step-pill { border-right: none; border-bottom: 1px solid var(--rule); }
    .step-pill:last-child { border-bottom: none; }
    .city-grid { grid-template-columns: 1fr; }
    .timeslot-grid { grid-template-columns: 1fr; }
    main { padding: 28px 18px 48px; }
    aside { padding: 32px 24px; }
    .actions { flex-direction: column-reverse; gap: 12px; }
    .actions .btn { width: 100%; }
  }
</style>
</head>
<body>

<header>
  <div class="brand">
    <div class="brand-mark"></div>
    <span>SWAPYYC</span>
    <span class="brand-tag">SEASONAL · TIRE · CHANGE</span>
  </div>
  <div class="header-meta">
    <span>EST <b>2019</b></span>
    <span>OPS <b>YYC</b></span>
    <span>STATUS <b style="color:var(--ok)">● OPEN</b></span>
  </div>
</header>

<div class="app">
  <main>
    <div class="stepper" id="stepper">
      <div class="step-pill active" data-step="1"><span class="step-num"><span>1</span></span> Service</div>
      <div class="step-pill" data-step="2"><span class="step-num"><span>2</span></span> Location</div>
      <div class="step-pill" data-step="3"><span class="step-num"><span>3</span></span> Date / Time</div>
      <div class="step-pill" data-step="4"><span class="step-num"><span>4</span></span> Your Info</div>
      <div class="step-pill" data-step="5"><span class="step-num"><span>5</span></span> Payment</div>
    </div>

    <div id="step-container"></div>

    <div class="actions" id="actions">
      <button class="btn btn-ghost" id="backBtn" style="visibility:hidden">← Back</button>
      <button class="btn btn-primary" id="nextBtn" disabled>Continue →</button>
    </div>
  </main>

  <aside>
    <div class="aside-title">Booking Summary</div>

    <div class="summary-block">
      <div class="summary-label">Service</div>
      <div class="summary-val empty" id="sum-service">not selected</div>
    </div>
    <div class="summary-block">
      <div class="summary-label">City</div>
      <div class="summary-val empty" id="sum-city">not selected</div>
    </div>
    <div class="summary-block">
      <div class="summary-label">Appointment</div>
      <div class="summary-val empty" id="sum-when">not selected</div>
    </div>
    <div class="summary-block">
      <div class="summary-label">Vehicle</div>
      <div class="summary-val empty" id="sum-vehicle">not entered</div>
    </div>

    <div class="price-block">
      <div class="price-row"><span>Tire swap (mounted)</span><span>$80.00</span></div>
      <div class="price-row"><span>GST (5%)</span><span>$4.00</span></div>
      <div class="price-total">
        <span class="label">Total Due</span>
        <span class="amount">$84.00</span>
      </div>
    </div>
  </aside>
</div>

<script>
  const state = {
    step: 1,
    service: null,
    city: null,
    date: null,
    time: null,
    info: { name: '', address: '', phone: '', vMake: '', vModel: '', vYear: '' },
    payment: { card: '', exp: '', cvc: '', name: '' },
    bookings: {}
  };

  const PRICE = 80;

  function toAmPm(h) {
    const period = h >= 12 ? 'PM' : 'AM';
    const hour = h === 0 ? 12 : (h > 12 ? h - 12 : h);
    return `${hour}:00 ${period}`;
  }
  function ymd(d) {
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  }
  function isWeekend(d) {
    return d.getDay() === 0 || d.getDay() === 6;
  }
  function slotsFor(d) {
    if (isWeekend(d)) return [9, 10, 11, 12];
    return [11, 12, 13, 14, 15, 16, 17, 18];
  }

  function render() {
    document.querySelectorAll('.step-pill').forEach(el => {
      const n = parseInt(el.dataset.step, 10);
      el.classList.toggle('active', n === state.step);
      el.classList.toggle('done', n < state.step);
    });

    const root = document.getElementById('step-container');
    root.innerHTML = '';
    const wrap = document.createElement('div');
    wrap.className = 'step-content';
    root.appendChild(wrap);

    if (state.step === 1) renderStep1(wrap);
    if (state.step === 2) renderStep2(wrap);
    if (state.step === 3) renderStep3(wrap);
    if (state.step === 4) renderStep4(wrap);
    if (state.step === 5) renderStep5(wrap);
    if (state.step === 6) renderSuccess(wrap);

    document.getElementById('sum-service').textContent = state.service ? 'Seasonal Tire Swap' : 'not selected';
    document.getElementById('sum-service').classList.toggle('empty', !state.service);

    const cityEl = document.getElementById('sum-city');
    cityEl.textContent = state.city ? 'Calgary, AB' : 'not selected';
    cityEl.classList.toggle('empty', !state.city);

    const whenEl = document.getElementById('sum-when');
    if (state.date && state.time !== null) {
      const dateStr = state.date.toLocaleDateString('en-CA', { weekday: 'short', month: 'short', day: 'numeric' });
      whenEl.innerHTML = `${dateStr} <small>${toAmPm(state.time)} — ${toAmPm(state.time+1)}</small>`;
      whenEl.classList.remove('empty');
    } else {
      whenEl.textContent = 'not selected';
      whenEl.classList.add('empty');
    }

    const vehEl = document.getElementById('sum-vehicle');
    if (state.info.vMake || state.info.vModel) {
      vehEl.textContent = `${state.info.vYear || ''} ${state.info.vMake} ${state.info.vModel}`.trim();
      vehEl.classList.remove('empty');
    } else {
      vehEl.textContent = 'not entered';
      vehEl.classList.add('empty');
    }

    const backBtn = document.getElementById('backBtn');
    const nextBtn = document.getElementById('nextBtn');
    const actions = document.getElementById('actions');

    if (state.step === 6) {
      actions.style.display = 'none';
      return;
    }
    actions.style.display = 'flex';

    backBtn.style.visibility = state.step === 1 ? 'hidden' : 'visible';
    nextBtn.disabled = !canContinue();

    if (state.step === 5) nextBtn.textContent = 'Confirm & Pay $84.00 →';
    else if (state.step === 4) nextBtn.textContent = 'Continue to Payment →';
    else nextBtn.textContent = 'Continue →';
  }

  function canContinue() {
    if (state.step === 1) return !!state.service;
    if (state.step === 2) return !!state.city;
    if (state.step === 3) return state.date && state.time !== null;
    if (state.step === 4) {
      const i = state.info;
      return i.name && i.address && i.phone && i.vMake && i.vModel && i.vYear;
    }
    if (state.step === 5) {
      const p = state.payment;
      return p.card.length >= 13 && p.exp.length >= 4 && p.cvc.length >= 3 && p.name;
    }
    return false;
  }

  function renderStep1(root) {
    root.innerHTML = `
      <div class="section-head">
        <div class="section-kicker">Step 01 / Service</div>
        <h1 class="section-title">Pick your <em>service</em></h1>
        <p class="section-sub">We do one thing and do it right. Seasonal swap, on-rim only — winter to summer, summer to winter.</p>
      </div>

      <div class="service-card ${state.service === 'swap' ? 'selected' : ''}" id="serviceCard">
        <div class="service-head">
          <div>
            <div class="service-title">Seasonal<br>Tire Swap</div>
          </div>
          <div class="service-price">
            $80<small>+ GST · per vehicle</small>
          </div>
        </div>
        <p class="service-desc">Full removal of your current set, mounting of your seasonal set, torqued to spec. We come to you.</p>
        <ul class="service-bullets">
          <li>4 tires removed and replaced</li>
          <li>Torqued to manufacturer specification</li>
          <li>Approx. 45 minutes on site</li>
          <li>Mobile service across Calgary</li>
        </ul>
      </div>

      <div class="requirement-banner">
        <b>REQUIREMENT —</b> All tires must already be mounted on rims. We do not perform tire-only swaps (no bead breaking / machine mounting).
      </div>
    `;
    document.getElementById('serviceCard').addEventListener('click', () => {
      state.service = 'swap';
      render();
    });
  }

  function renderStep2(root) {
    root.innerHTML = `
      <div class="section-head">
        <div class="section-kicker">Step 02 / Location</div>
        <h1 class="section-title">Where are <em>you</em>?</h1>
        <p class="section-sub">Currently servicing Calgary only. More cities rolling out next season.</p>
      </div>

      <div class="city-grid">
        <div class="city-card available ${state.city === 'calgary' ? 'selected' : ''}" data-city="calgary">
          <div class="city-name">Calgary</div>
          <div class="city-prov">Alberta, CA</div>
          <span class="city-status">${state.city === 'calgary' ? '● Selected' : '● Available'}</span>
        </div>
        <div class="city-card unavailable">
          <div class="city-name">Edmonton</div>
          <div class="city-prov">Alberta, CA</div>
          <span class="city-status">Coming Soon</span>
        </div>
        <div class="city-card unavailable">
          <div class="city-name">Red Deer</div>
          <div class="city-prov">Alberta, CA</div>
          <span class="city-status">Coming Soon</span>
        </div>
      </div>
    `;
    root.querySelector('.city-card.available').addEventListener('click', () => {
      state.city = 'calgary';
      render();
    });
  }

  let calCursor = new Date();
  calCursor.setDate(1);

  function renderStep3(root) {
    root.innerHTML = `
      <div class="section-head">
        <div class="section-kicker">Step 03 / Schedule</div>
        <h1 class="section-title">Pick a <em>slot</em></h1>
        <p class="section-sub">Weekdays 11 AM – 7 PM with a lunch block. Weekends 9 AM – 1 PM. Each appointment is one hour.</p>
      </div>

      <div class="datetime-wrap">
        <div>
          <div class="cal-head">
            <div class="cal-month" id="calMonth"></div>
            <div class="cal-nav">
              <button id="calPrev">‹</button>
              <button id="calNext">›</button>
            </div>
          </div>
          <div class="cal-grid" id="calGrid"></div>
        </div>

        <div class="timeslots">
          <div class="timeslot-head">
            <span>Available Times</span>
            <span class="day-label" id="dayLabel"></span>
          </div>
          <div id="slotsRoot"></div>
        </div>
      </div>
    `;

    drawCalendar();
    drawSlots();

    document.getElementById('calPrev').onclick = () => {
      calCursor.setMonth(calCursor.getMonth() - 1);
      drawCalendar();
    };
    document.getElementById('calNext').onclick = () => {
      calCursor.setMonth(calCursor.getMonth() + 1);
      drawCalendar();
    };
  }

  function drawCalendar() {
    const monthEl = document.getElementById('calMonth');
    const grid = document.getElementById('calGrid');
    const year = calCursor.getFullYear();
    const month = calCursor.getMonth();

    monthEl.textContent = calCursor.toLocaleString('en-CA', { month: 'long', year: 'numeric' });

    grid.innerHTML = '';

    ['MON','TUE','WED','THU','FRI','SAT','SUN'].forEach(d => {
      const el = document.createElement('div');
      el.className = 'cal-dow';
      el.textContent = d;
      grid.appendChild(el);
    });

    const firstDay = new Date(year, month, 1);
    let lead = firstDay.getDay() - 1;
    if (lead < 0) lead = 6;

    for (let i = 0; i < lead; i++) {
      const el = document.createElement('div');
      el.className = 'cal-day empty';
      grid.appendChild(el);
    }

    const daysInMonth = new Date(year, month + 1, 0).getDate();
    const today = new Date();
    today.setHours(0,0,0,0);

    for (let d = 1; d <= daysInMonth; d++) {
      const date = new Date(year, month, d);
      const el = document.createElement('div');
      el.className = 'cal-day';
      el.textContent = d;
      if (isWeekend(date)) el.classList.add('weekend');
      if (date < today) el.classList.add('disabled');
      if (ymd(date) === ymd(today)) el.classList.add('today');
      if (state.date && ymd(state.date) === ymd(date)) el.classList.add('selected');

      el.addEventListener('click', () => {
        if (el.classList.contains('disabled') || el.classList.contains('empty')) return;
        state.date = date;
        state.time = null;
        drawCalendar();
        drawSlots();
        render();
      });
      grid.appendChild(el);
    }
  }

  function drawSlots() {
    const root = document.getElementById('slotsRoot');
    const dayLabel = document.getElementById('dayLabel');

    if (!state.date) {
      root.innerHTML = `<div class="no-date">Select a date to see available time slots.</div>`;
      dayLabel.textContent = '';
      return;
    }

    dayLabel.textContent = state.date.toLocaleDateString('en-CA', { weekday: 'long', month: 'short', day: 'numeric' });

    const slots = slotsFor(state.date);
    const dayKey = ymd(state.date);
    const booked = state.bookings[dayKey] || new Set();
    const weekday = !isWeekend(state.date);

    let lunchBlocked = null;
    if (weekday) {
      if (state.time === 13) lunchBlocked = 14;
      else if (state.time === 14) lunchBlocked = 13;
    }

    let html = `<div class="timeslot-grid">`;
    slots.forEach(h => {
      const isSel = state.time === h;
      const isTaken = booked.has(h);
      const isLunch = lunchBlocked === h;
      const cls = ['slot'];
      if (isSel) cls.push('selected');
      if (isTaken) cls.push('taken');
      if (isLunch) cls.push('blocked');

      let label = '';
      if (isTaken) label = 'BOOKED';
      else if (isLunch) label = 'LUNCH BLOCK';
      else label = `60 min · $${PRICE}`;

      html += `<button class="${cls.join(' ')}" data-h="${h}" ${isTaken || isLunch ? 'disabled' : ''}>
        ${toAmPm(h)}
        <small>${label}</small>
      </button>`;
    });
    html += `</div>`;

    if (weekday) {
      html += `<div class="lunch-note">
        ⚙ The <b style="color:var(--warning)">1 PM</b> and <b style="color:var(--warning)">2 PM</b> slots share a lunch hour — picking one locks the other for that day.
      </div>`;
    } else {
      html += `<div class="lunch-note">
        ⚙ Weekend hours: <b style="color:var(--warning)">9 AM – 1 PM</b>. Last appointment starts at 12 PM.
      </div>`;
    }

    root.innerHTML = html;

    root.querySelectorAll('.slot').forEach(btn => {
      btn.addEventListener('click', () => {
        if (btn.classList.contains('taken') || btn.classList.contains('blocked')) return;
        state.time = parseInt(btn.dataset.h, 10);
        drawSlots();
        render();
      });
    });
  }

  function renderStep4(root) {
    root.innerHTML = `
      <div class="section-head">
        <div class="section-kicker">Step 04 / Your Details</div>
        <h1 class="section-title">Tell us <em>about you</em></h1>
        <p class="section-sub">We need to know where to roll up and which vehicle is getting the swap.</p>
      </div>

      <div class="form-grid">
        <div class="field full">
          <label>Full Name</label>
          <input id="f-name" type="text" placeholder="Jane Doe" value="${state.info.name}">
        </div>
        <div class="field full">
          <label>Service Address (Calgary)</label>
          <input id="f-address" type="text" placeholder="123 Mountain View Rd SW, Calgary AB" value="${state.info.address}">
        </div>
        <div class="field full">
          <label>Phone Number</label>
          <input id="f-phone" type="tel" placeholder="+1 (587) 000-0000" value="${state.info.phone}">
        </div>

        <div class="vehicle-row">
          <div class="field">
            <label>Vehicle Make</label>
            <input id="f-make" type="text" placeholder="Toyota" value="${state.info.vMake}">
          </div>
          <div class="field">
            <label>Vehicle Model</label>
            <input id="f-model" type="text" placeholder="RAV4" value="${state.info.vModel}">
          </div>
          <div class="field">
            <label>Year</label>
            <input id="f-year" type="text" placeholder="2021" maxlength="4" value="${state.info.vYear}">
          </div>
        </div>
      </div>

      <div class="requirement-banner" style="margin-top:32px">
        <b>REMINDER —</b> Tires must already be on rims and accessible at the service address.
      </div>
    `;

    const bind = (id, key) => {
      document.getElementById(id).addEventListener('input', e => {
        state.info[key] = e.target.value;
        const vehEl = document.getElementById('sum-vehicle');
        if (state.info.vMake || state.info.vModel) {
          vehEl.textContent = `${state.info.vYear || ''} ${state.info.vMake} ${state.info.vModel}`.trim();
          vehEl.classList.remove('empty');
        } else {
          vehEl.textContent = 'not entered';
          vehEl.classList.add('empty');
        }
        document.getElementById('nextBtn').disabled = !canContinue();
      });
    };
    bind('f-name','name');
    bind('f-address','address');
    bind('f-phone','phone');
    bind('f-make','vMake');
    bind('f-model','vModel');
    bind('f-year','vYear');
  }

  function renderStep5(root) {
    root.innerHTML = `
      <div class="section-head">
        <div class="section-kicker">Step 05 / Payment</div>
        <h1 class="section-title">Lock <em>it in</em></h1>
        <p class="section-sub">Secure payment via Stripe. Your card is not charged until the swap is complete.</p>
      </div>

      <div class="pay-wrap">
        <div class="pay-card">
          <div class="stripe-badge">SECURED BY STRIPE · PCI DSS</div>

          <div class="field">
            <label>Cardholder Name</label>
            <input id="p-name" type="text" placeholder="Name on card" value="${state.payment.name}">
          </div>

          <div class="field" style="margin-top:16px">
            <label>Card Number</label>
            <input id="p-card" type="text" placeholder="1234 5678 9012 3456" maxlength="19">
          </div>

          <div class="card-row">
            <div class="field">
              <label>Expiry</label>
              <input id="p-exp" type="text" placeholder="MM / YY" maxlength="7">
            </div>
            <div class="field">
              <label>CVC</label>
              <input id="p-cvc" type="text" placeholder="123" maxlength="4">
            </div>
          </div>
        </div>

        <div class="requirement-banner">
          <b>CANCELLATION —</b> Free cancel or reschedule up to 24h before. No-shows charged $99.
        </div>
      </div>
    `;

    document.getElementById('p-name').addEventListener('input', e => { state.payment.name = e.target.value; document.getElementById('nextBtn').disabled = !canContinue(); });
    document.getElementById('p-card').addEventListener('input', e => {
      const raw = e.target.value.replace(/\D/g,'').slice(0,16);
      e.target.value = raw.replace(/(\d{4})(?=\d)/g,'$1 ');
      state.payment.card = raw;
      document.getElementById('nextBtn').disabled = !canContinue();
    });
    document.getElementById('p-exp').addEventListener('input', e => {
      let raw = e.target.value.replace(/\D/g,'').slice(0,4);
      e.target.value = raw.length >= 3 ? raw.slice(0,2)+' / '+raw.slice(2) : raw;
      state.payment.exp = raw;
      document.getElementById('nextBtn').disabled = !canContinue();
    });
    document.getElementById('p-cvc').addEventListener('input', e => {
      const v = e.target.value.replace(/\D/g,'').slice(0,4);
      e.target.value = v;
      state.payment.cvc = v;
      document.getElementById('nextBtn').disabled = !canContinue();
    });
  }

  function renderSuccess(root) {
    const code = 'YYC-' + Math.random().toString(36).slice(2,8).toUpperCase();
    const dateStr = state.date.toLocaleDateString('en-CA', { weekday: 'long', month: 'long', day: 'numeric' });
    root.innerHTML = `
      <div class="success-screen">
        <div class="success-mark">✓</div>
        <h1>You're <em>booked</em></h1>
        <p style="color:var(--ink-dim); max-width:480px; margin: 0 auto 18px">
          Confirmation sent to your phone. We'll text you when our tech is on the way on <b style="color:var(--ink)">${dateStr}</b> at <b style="color:var(--ink)">${toAmPm(state.time)}</b>.
        </p>
        <div class="confirm-code">CONFIRMATION · ${code}</div>
      </div>
    `;
  }

  document.getElementById('nextBtn').addEventListener('click', () => {
    if (!canContinue()) return;
    if (state.step === 5) {
      const key = ymd(state.date);
      if (!state.bookings[key]) state.bookings[key] = new Set();
      state.bookings[key].add(state.time);
      if (state.time === 13) state.bookings[key].add(14);
      else if (state.time === 14) state.bookings[key].add(13);
      state.step = 6;
    } else {
      state.step++;
    }
    render();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  });

  document.getElementById('backBtn').addEventListener('click', () => {
    if (state.step > 1) state.step--;
    render();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  });

  render();
</script>
</body>
</html>
