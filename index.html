<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SWAPYYC — Mobile Tire Service Booking</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=JetBrains+Mono:wght@400;500;700&family=Instrument+Serif:ital@0;1&family=Noto+Sans+SC:wght@400;700;900&family=Noto+Sans+KR:wght@400;700;900&family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0d0d;
    --bg-2: #161513;
    --panel: #1c1a17;
    --ink: #f4f1ea;
    --ink-dim: #8a8680;
    --ink-faint: #4a4742;
    --rule: #2a2826;
    --accent: #ff5722;
    --accent-deep: #c43d10;
    --warning: #fbbf24;
    --ok: #65d472;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    background: var(--bg);
    color: var(--ink);
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    font-size: 14px;
    line-height: 1.5;
    overflow-x: hidden;
    min-height: 100vh;
  }

  /* CJK languages need a softer body font */
  html[lang="zh"] body, html[lang="ko"] body, html[lang="ja"] body {
    font-family: 'Noto Sans SC', 'Noto Sans KR', 'Noto Sans JP', 'JetBrains Mono', sans-serif;
  }
  html[lang="zh"] body { font-family: 'Noto Sans SC', sans-serif; }
  html[lang="ko"] body { font-family: 'Noto Sans KR', sans-serif; }
  html[lang="ja"] body { font-family: 'Noto Sans JP', sans-serif; }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: radial-gradient(circle at 1px 1px, rgba(255,255,255,0.022) 1px, transparent 0);
    background-size: 22px 22px;
    pointer-events: none;
    z-index: 0;
  }

  header {
    position: relative;
    z-index: 10;
    padding: 22px 40px;
    border-bottom: 1px solid var(--rule);
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: var(--bg);
    gap: 20px;
  }

  .brand {
    display: flex;
    align-items: center;
    gap: 14px;
    font-family: 'Archivo Black', sans-serif;
    font-size: 20px;
    letter-spacing: 0.04em;
  }
  .brand-mark {
    width: 32px; height: 32px;
    border-radius: 50%;
    border: 3px solid var(--ink);
    position: relative;
    flex-shrink: 0;
  }
  .brand-mark::before {
    content: '';
    position: absolute;
    inset: 5px;
    border-radius: 50%;
    border: 2px solid var(--accent);
  }
  .brand-mark::after {
    content: '';
    position: absolute;
    inset: 12px;
    background: var(--ink);
    border-radius: 50%;
  }
  .brand-tag {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--ink-dim);
    letter-spacing: 0.15em;
    margin-left: 6px;
    border-left: 1px solid var(--rule);
    padding-left: 14px;
  }

  .header-right {
    display: flex;
    align-items: center;
    gap: 28px;
  }

  .header-meta {
    display: flex;
    gap: 24px;
    font-size: 11px;
    letter-spacing: 0.1em;
    color: var(--ink-dim);
    text-transform: uppercase;
  }
  .header-meta span b {
    color: var(--ink);
    font-weight: 500;
    margin-left: 6px;
  }

  /* Language toggle */
  .lang-toggle {
    position: relative;
  }
  .lang-btn {
    background: var(--panel);
    border: 1px solid var(--rule);
    color: var(--ink);
    padding: 9px 14px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 10px;
    transition: border-color .15s;
  }
  .lang-btn:hover { border-color: var(--accent); }
  .lang-btn::before {
    content: '◐';
    color: var(--accent);
    font-size: 12px;
  }
  .lang-btn::after {
    content: '▾';
    color: var(--ink-dim);
    font-size: 9px;
    margin-left: 2px;
  }
  .lang-menu {
    position: absolute;
    top: calc(100% + 6px);
    right: 0;
    background: var(--panel);
    border: 1px solid var(--rule);
    min-width: 180px;
    display: none;
    z-index: 50;
  }
  .lang-menu.open { display: block; }
  .lang-menu button {
    display: flex;
    justify-content: space-between;
    align-items: center;
    width: 100%;
    background: transparent;
    border: none;
    color: var(--ink);
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    padding: 12px 16px;
    cursor: pointer;
    text-align: left;
    border-bottom: 1px solid var(--rule);
    transition: background .15s;
  }
  .lang-menu button:last-child { border-bottom: none; }
  .lang-menu button:hover { background: var(--bg); color: var(--accent); }
  .lang-menu button.active {
    color: var(--accent);
    background: rgba(255,87,34,0.04);
  }
  .lang-menu button .code {
    font-size: 10px;
    color: var(--ink-faint);
    letter-spacing: 0.1em;
  }

  .app {
    position: relative;
    z-index: 1;
    display: grid;
    grid-template-columns: 1fr 380px;
    min-height: calc(100vh - 73px);
  }

  main {
    padding: 56px 64px 80px;
    position: relative;
    border-right: 1px solid var(--rule);
  }

  aside {
    background: var(--bg-2);
    padding: 56px 40px;
    position: sticky;
    top: 73px;
    height: calc(100vh - 73px);
    overflow-y: auto;
  }

  .stepper {
    display: flex;
    gap: 0;
    margin-bottom: 56px;
    border: 1px solid var(--rule);
  }
  .step-pill {
    flex: 1;
    padding: 14px 18px;
    border-right: 1px solid var(--rule);
    display: flex;
    align-items: center;
    gap: 12px;
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--ink-faint);
    transition: all .3s;
    background: var(--bg);
  }
  .step-pill:last-child { border-right: none; }
  .step-pill.active {
    background: var(--accent);
    color: var(--bg);
  }
  .step-pill.done {
    color: var(--ink);
    background: var(--bg);
  }
  .step-num {
    font-family: 'Archivo Black', sans-serif;
    font-size: 13px;
    width: 24px; height: 24px;
    border-radius: 50%;
    background: var(--bg-2);
    color: var(--ink);
    display: grid;
    place-items: center;
    flex-shrink: 0;
  }
  .step-pill.active .step-num {
    background: var(--bg);
    color: var(--accent);
  }
  .step-pill.done .step-num {
    background: var(--ok);
    color: var(--bg);
  }
  .step-pill.done .step-num::before { content: '✓'; }
  .step-pill.done .step-num span { display: none; }

  .section-head {
    margin-bottom: 36px;
  }
  .section-kicker {
    font-size: 11px;
    letter-spacing: 0.2em;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .section-kicker::before {
    content: '';
    width: 24px;
    height: 1px;
    background: var(--accent);
  }
  .section-title {
    font-family: 'Archivo Black', sans-serif;
    font-size: clamp(40px, 5.5vw, 72px);
    line-height: 0.95;
    letter-spacing: -0.02em;
    text-transform: uppercase;
    margin-bottom: 18px;
  }
  html[lang="zh"] .section-title,
  html[lang="ko"] .section-title,
  html[lang="ja"] .section-title {
    font-family: 'Noto Sans SC', 'Noto Sans KR', 'Noto Sans JP', sans-serif;
    font-weight: 900;
  }
  html[lang="zh"] .section-title { font-family: 'Noto Sans SC', sans-serif; }
  html[lang="ko"] .section-title { font-family: 'Noto Sans KR', sans-serif; }
  html[lang="ja"] .section-title { font-family: 'Noto Sans JP', sans-serif; }

  .section-title em {
    font-family: 'Instrument Serif', serif;
    font-style: italic;
    font-weight: 400;
    color: var(--accent);
    text-transform: lowercase;
    letter-spacing: -0.01em;
  }
  .section-sub {
    color: var(--ink-dim);
    font-size: 13px;
    max-width: 540px;
    line-height: 1.6;
  }

  /* Service grid */
  .service-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    max-width: 820px;
  }
  .service-card {
    background: var(--panel);
    border: 1px solid var(--rule);
    padding: 28px;
    cursor: pointer;
    transition: all .25s;
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }
  .service-card:hover, .service-card.selected {
    border-color: var(--accent);
  }
  .service-card.selected::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(255,87,34,0.08), transparent 65%);
    pointer-events: none;
  }
  .service-card.selected::after {
    content: '✓';
    position: absolute;
    top: 14px; right: 14px;
    width: 24px; height: 24px;
    border-radius: 50%;
    background: var(--accent);
    color: var(--bg);
    display: grid;
    place-items: center;
    font-size: 13px;
    font-weight: 700;
  }

  .service-icon {
    font-size: 28px;
    margin-bottom: 14px;
    color: var(--accent);
    line-height: 1;
  }
  .service-name {
    font-family: 'Archivo Black', sans-serif;
    font-size: 20px;
    line-height: 1.1;
    text-transform: uppercase;
    letter-spacing: -0.005em;
    margin-bottom: 4px;
  }
  html[lang="zh"] .service-name { font-family: 'Noto Sans SC', sans-serif; font-weight: 900; }
  html[lang="ko"] .service-name { font-family: 'Noto Sans KR', sans-serif; font-weight: 900; }
  html[lang="ja"] .service-name { font-family: 'Noto Sans JP', sans-serif; font-weight: 900; }

  .service-sub {
    font-size: 14px;
    color: var(--ink);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 18px;
    font-weight: 500;
  }
  .service-price {
    margin-top: auto;
    padding-top: 18px;
    border-top: 1px dashed var(--rule);
    display: flex;
    justify-content: space-between;
    align-items: baseline;
  }
  .service-price .amt {
    font-family: 'Archivo Black', sans-serif;
    font-size: 28px;
    color: var(--accent);
  }
  .service-price .note {
    font-size: 10px;
    color: var(--ink-dim);
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  .requirement-banner {
    margin-top: 28px;
    padding: 14px 18px;
    background: rgba(251, 191, 36, 0.08);
    border-left: 3px solid var(--warning);
    font-size: 12px;
    color: var(--ink);
    max-width: 820px;
    line-height: 1.6;
  }
  .requirement-banner b {
    color: var(--warning);
    letter-spacing: 0.05em;
  }

  /* City */
  .city-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
    max-width: 720px;
  }
  .city-card {
    background: var(--panel);
    border: 1px solid var(--rule);
    padding: 28px;
    cursor: pointer;
    transition: all .2s;
    position: relative;
  }
  .city-card.available:hover, .city-card.selected {
    border-color: var(--accent);
  }
  .city-card.selected {
    background: linear-gradient(135deg, rgba(255,87,34,0.06), transparent);
  }
  .city-card.unavailable {
    opacity: 0.45;
    cursor: not-allowed;
  }
  .city-name {
    font-family: 'Archivo Black', sans-serif;
    font-size: 22px;
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  html[lang="zh"] .city-name { font-family: 'Noto Sans SC', sans-serif; font-weight: 900; }
  html[lang="ko"] .city-name { font-family: 'Noto Sans KR', sans-serif; font-weight: 900; }
  html[lang="ja"] .city-name { font-family: 'Noto Sans JP', sans-serif; font-weight: 900; }
  .city-prov {
    font-size: 11px;
    color: var(--ink-dim);
    letter-spacing: 0.1em;
    margin-bottom: 16px;
    text-transform: uppercase;
  }
  .city-status {
    font-size: 10px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    display: inline-block;
    padding: 4px 10px;
    border: 1px solid currentColor;
  }
  .city-card.available .city-status { color: var(--ok); }
  .city-card.unavailable .city-status { color: var(--ink-dim); }
  .city-card.selected .city-status { color: var(--accent); border-color: var(--accent); }

  /* Calendar */
  .datetime-wrap {
    display: grid;
    grid-template-columns: 1.1fr 1fr;
    gap: 48px;
    max-width: 900px;
  }
  .cal-head {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 22px;
  }
  .cal-month {
    font-family: 'Archivo Black', sans-serif;
    font-size: 22px;
    text-transform: uppercase;
    letter-spacing: 0.02em;
  }
  .cal-nav { display: flex; gap: 8px; }
  .cal-nav button {
    background: var(--panel);
    border: 1px solid var(--rule);
    color: var(--ink);
    width: 36px; height: 36px;
    cursor: pointer;
    font-family: inherit;
    font-size: 14px;
    transition: all .15s;
  }
  .cal-nav button:hover { border-color: var(--accent); color: var(--accent); }

  .cal-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 4px;
  }
  .cal-dow {
    text-align: center;
    font-size: 10px;
    color: var(--ink-dim);
    letter-spacing: 0.15em;
    padding: 8px 0;
  }
  .cal-day {
    aspect-ratio: 1;
    border: 1px solid var(--rule);
    background: var(--panel);
    display: grid;
    place-items: center;
    cursor: pointer;
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px;
    color: var(--ink);
    transition: all .15s;
    position: relative;
  }
  .cal-day:hover:not(.disabled):not(.empty) {
    border-color: var(--accent);
    color: var(--accent);
  }
  .cal-day.selected {
    background: var(--accent);
    color: var(--bg);
    border-color: var(--accent);
    font-weight: 700;
  }
  .cal-day.today::after {
    content: '';
    position: absolute;
    bottom: 5px; left: 50%;
    transform: translateX(-50%);
    width: 4px; height: 4px;
    background: var(--accent);
    border-radius: 50%;
  }
  .cal-day.selected.today::after { background: var(--bg); }
  .cal-day.disabled {
    color: var(--ink-faint);
    cursor: not-allowed;
    background: transparent;
    border-color: transparent;
  }
  .cal-day.empty {
    border: none;
    background: transparent;
    cursor: default;
  }
  .cal-day.closed {
    color: var(--ink-faint);
    background: transparent;
    cursor: not-allowed;
    border-color: var(--rule);
    opacity: 0.4;
  }
  .cal-day.open-day {
    background: rgba(101,212,114,0.05);
  }

  .timeslots { display: flex; flex-direction: column; }
  .timeslot-head {
    font-size: 11px;
    letter-spacing: 0.15em;
    color: var(--ink-dim);
    text-transform: uppercase;
    margin-bottom: 18px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .timeslot-head span.day-label { color: var(--accent); }
  .timeslot-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }
  .no-date {
    color: var(--ink-faint);
    font-size: 12px;
    padding: 32px;
    border: 1px dashed var(--rule);
    text-align: center;
  }
  .slot {
    background: var(--panel);
    border: 1px solid var(--rule);
    padding: 14px 16px;
    cursor: pointer;
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px;
    color: var(--ink);
    text-align: left;
    transition: all .15s;
  }
  .slot:hover:not(.taken) {
    border-color: var(--accent);
    color: var(--accent);
  }
  .slot.selected {
    background: var(--accent);
    color: var(--bg);
    border-color: var(--accent);
    font-weight: 700;
  }
  .slot small {
    display: block;
    font-size: 10px;
    color: var(--ink-dim);
    letter-spacing: 0.1em;
    margin-top: 2px;
  }
  .slot.selected small { color: rgba(13,13,13,0.7); }
  .slot.taken {
    opacity: 0.35;
    cursor: not-allowed;
    text-decoration: line-through;
  }
  .hours-note {
    margin-top: 16px;
    padding: 12px 14px;
    background: rgba(101, 212, 114, 0.05);
    border-left: 2px solid var(--ok);
    font-size: 11px;
    color: var(--ink-dim);
    line-height: 1.6;
  }
  .hours-note b { color: var(--ok); }

  /* Form */
  .form-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    max-width: 720px;
  }
  .field { display: flex; flex-direction: column; gap: 8px; }
  .field.full { grid-column: 1 / -1; }
  .field label {
    font-size: 10px;
    letter-spacing: 0.2em;
    color: var(--ink-dim);
    text-transform: uppercase;
  }
  .field input {
    background: var(--panel);
    border: 1px solid var(--rule);
    padding: 14px 16px;
    color: var(--ink);
    font-family: inherit;
    font-size: 14px;
    transition: border-color .15s;
  }
  .field input:focus { outline: none; border-color: var(--accent); }
  .field input::placeholder { color: var(--ink-faint); }
  .vehicle-row {
    grid-column: 1 / -1;
    display: grid;
    grid-template-columns: 1.5fr 1.5fr 0.8fr;
    gap: 12px;
  }

  /* Payment */
  .pay-wrap { max-width: 540px; }
  .pay-card {
    background: var(--panel);
    border: 1px solid var(--rule);
    padding: 32px;
    margin-bottom: 24px;
  }
  .stripe-badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-size: 10px;
    letter-spacing: 0.15em;
    color: var(--ink-dim);
    margin-bottom: 24px;
    text-transform: uppercase;
  }
  .stripe-badge::before { content: '🔒'; font-size: 12px; }
  .card-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-top: 16px;
  }

  .actions {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 56px;
    max-width: 900px;
  }
  .btn {
    font-family: 'Archivo Black', sans-serif;
    font-size: 13px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 18px 36px;
    border: none;
    cursor: pointer;
    transition: all .2s;
    font-weight: 900;
  }
  html[lang="zh"] .btn { font-family: 'Noto Sans SC', sans-serif; font-weight: 900; }
  html[lang="ko"] .btn { font-family: 'Noto Sans KR', sans-serif; font-weight: 900; }
  html[lang="ja"] .btn { font-family: 'Noto Sans JP', sans-serif; font-weight: 900; }
  .btn-primary {
    background: var(--accent);
    color: var(--bg);
  }
  .btn-primary:hover:not(:disabled) { background: var(--ink); }
  .btn-primary:disabled {
    background: var(--rule);
    color: var(--ink-faint);
    cursor: not-allowed;
  }
  .btn-ghost {
    background: transparent;
    color: var(--ink-dim);
    border: 1px solid var(--rule);
  }
  .btn-ghost:hover { color: var(--ink); border-color: var(--ink); }

  .aside-title {
    font-size: 11px;
    letter-spacing: 0.2em;
    color: var(--ink-dim);
    text-transform: uppercase;
    margin-bottom: 22px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .aside-title::before {
    content: '';
    width: 6px; height: 6px;
    background: var(--accent);
    display: inline-block;
    border-radius: 50%;
  }
  .summary-block {
    margin-bottom: 26px;
    padding-bottom: 26px;
    border-bottom: 1px dashed var(--rule);
  }
  .summary-block:last-of-type { border-bottom: none; }
  .summary-label {
    font-size: 10px;
    color: var(--ink-dim);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  .summary-val {
    font-family: 'Archivo Black', sans-serif;
    font-size: 17px;
    line-height: 1.25;
    text-transform: uppercase;
  }
  html[lang="zh"] .summary-val { font-family: 'Noto Sans SC', sans-serif; font-weight: 900; }
  html[lang="ko"] .summary-val { font-family: 'Noto Sans KR', sans-serif; font-weight: 900; }
  html[lang="ja"] .summary-val { font-family: 'Noto Sans JP', sans-serif; font-weight: 900; }

  .summary-val.empty {
    font-family: 'Instrument Serif', serif;
    font-style: italic;
    font-weight: 400;
    color: var(--ink-faint);
    text-transform: lowercase;
    font-size: 16px;
  }
  .summary-val small {
    display: block;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--ink-dim);
    text-transform: none;
    letter-spacing: 0;
    margin-top: 4px;
    font-weight: 400;
  }

    margin-top: 14px;
  }

    font-size: 11px;
    letter-spacing: 0.15em;
    color: var(--ink);
    text-transform: uppercase;
  }
  .price-total .amount {
    font-family: 'Archivo Black', sans-serif;
    font-size: 30px;

    border: 3px solid var(--ok);
    border-radius: 50%;
    display: grid;
    place-items: center;
    margin: 0 auto 32px;
    font-size: 36px;
    color: var(--ok);
    animation: pop .5s cubic-bezier(.2,1.4,.5,1);
  }
  @keyframes pop { 0% { transform: scale(0); } 100% { transform: scale(1); } }
  .success-screen h1 {

    font-size: 48px;

    padding: 10px 18px;

    letter-spacing: 0.15em;
    color: var(--accent);
  }

  .step-content { animation: fade-in .4s ease-out; }
  @keyframes fade-in {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @media (max-width: 1080px) {
    .app { grid-template-columns: 1fr; }
    aside {

  // Day name translations for calendar / summary
  const DAY_NAMES = {

    zh: { full: ['星期日','星期一','星期二','星期三','星期四','星期五','星期六'], short: ['周日','周一','周二','周三','周四','周五','周六'], abbr: ['日','一','二','三','四','五','六'] },
    ko: { full: ['일요일','월요일','화요일','수요일','목요일','금요일','토요일'], short: ['일','월','화','수','목','금','토'], abbr: ['일','월','화','수','목','금','토'] },

  };

  const MONTH_NAMES = {
    en: ['January','February','March','April','May','June','July','August','September','October','November','December'],
    zh: ['1 月','2 月','3 月','4 月','5 月','6 月','7 月','8 月','9 月','10 月','11 月','12 月'],
    ko: ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'],
    ja: ['1 月','2 月','3 月','4 月','5 月','6 月','7 月','8 月','9 月','10 月','11 月','12 月'],
    es: ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre']
  };

  function t(key) { return I18N[state.lang][key] || I18N.en[key] || key; }

  // ============================================================
  //  SERVICES
  // ============================================================
  const SERVICES = {
    'swap_sedan': { price: 89, icon: '◐', nameKey: 'svc_swap_sedan', subKey: 'svc_swap_sedan_sub' },
    'swap_suv':   { price: 99, icon: '◑', nameKey: 'svc_swap_suv',   subKey: 'svc_swap_suv_sub' },
    'swap_two':   { price: 169, icon: '◉', nameKey: 'svc_swap_two', subKey: 'svc_swap_two_sub' },
    'flat':       { price: 89, icon: '✕', nameKey: 'svc_flat',       subKey: 'svc_flat_sub' }
  };

  // ============================================================
  //  STATE
  // ============================================================
  const state = {
    lang: 'en',
    step: 1,
    service: null,
    city: null,
    date: null,
    time: null,
    info: { name: '', address: '', phone: '', vMake: '', vModel: '', vYear: '' },
    payment: { card: '', exp: '', cvc: '', name: '' },
    bookings: {}
  };

  // ============================================================
  //  UTILS
  // ============================================================
  function toAmPm(h) {
    const period = h >= 12 ? 'PM' : 'AM';
    const hour = h === 0 ? 12 : (h > 12 ? h - 12 : h);
    return `${hour}:00 ${period}`;
  }
  function ymd(d) {
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  }
  // Open Tue (2), Wed (3), Thu (4), Fri (5), Sat (6). Closed Sun (0), Mon (1).
  function isOpenDay(d) {
    const dow = d.getDay();
    return dow >= 2 && dow <= 6;
  }
  function slotsFor(d) {
    // 9, 10, 11, 12, 13, 14 (last appt starts 2 PM, ends 3 PM)
    return [9, 10, 11, 12, 13, 14];
  }

  function fmtDate(d, style) {
    // style: 'long' (Tuesday, January 5) or 'short' (Tue, Jan 5)
    const lang = state.lang;
    const dayName = style === 'long' ? DAY_NAMES[lang].full[d.getDay()] : DAY_NAMES[lang].short[d.getDay()];
    const month = MONTH_NAMES[lang][d.getMonth()];
    const date = d.getDate();
    if (lang === 'zh' || lang === 'ja') {
      return `${month}${date}日 ${dayName}`;
    }
    if (lang === 'ko') {
      return `${month} ${date}일 ${dayName}`;
    }
    return `${dayName}, ${month} ${date}`;
  }

  function fmtMonthYear(d) {
    const lang = state.lang;
    const month = MONTH_NAMES[lang][d.getMonth()];
    const year = d.getFullYear();
    if (lang === 'zh' || lang === 'ja') return `${year} ${month}`;
    if (lang === 'ko') return `${year}년 ${month}`;
    return `${month} ${year}`;
  }

  // ============================================================
  //  LANGUAGE
  // ============================================================
  function applyI18n() {
    document.documentElement.lang = state.lang;
    document.querySelectorAll('[data-i18n]').forEach(el => {
      const key = el.getAttribute('data-i18n');
      const val = t(key);
      if (val.includes('<')) el.innerHTML = val;
      else el.textContent = val;
    });
    document.getElementById('langLabel').textContent = state.lang.toUpperCase();
    document.querySelectorAll('#langMenu button').forEach(b => {
      b.classList.toggle('active', b.dataset.lang === state.lang);
    });
  }

  function setLanguage(lang) {
    state.lang = lang;
    applyI18n();
    render(); // re-render current step in new language
  }

  // ============================================================
  //  PRICE
  // ============================================================
  function getServicePrice() {
    return state.service ? SERVICES[state.service].price : 0;
  }
  function updatePriceBlock() {
    const base = getServicePrice();
    const gst = +(base * 0.05).toFixed(2);
    const total = +(base + gst).toFixed(2);
    document.getElementById('price-base').textContent = `$${base.toFixed(2)}`;
    document.getElementById('price-gst').textContent = `$${gst.toFixed(2)}`;
    document.getElementById('price-total-amt').textContent = `$${total.toFixed(2)}`;
  }
  function totalDue() {
    const base = getServicePrice();
    return +(base * 1.05).toFixed(2);
  }

  // ============================================================
  //  RENDER
  // ============================================================
  function render() {
    document.querySelectorAll('.step-pill').forEach(el => {
      const n = parseInt(el.dataset.step, 10);
      el.classList.toggle('active', n === state.step);
      el.classList.toggle('done', n < state.step);
    });

    const root = document.getElementById('step-container');
    root.innerHTML = '';
    const wrap = document.createElement('div');
    wrap.className = 'step-content';
    root.appendChild(wrap);

    if (state.step === 1) renderStep1(wrap);
    if (state.step === 2) renderStep2(wrap);
    if (state.step === 3) renderStep3(wrap);
    if (state.step === 4) renderStep4(wrap);
    if (state.step === 5) renderStep5(wrap);
    if (state.step === 6) renderSuccess(wrap);

    // Sidebar
    const svcEl = document.getElementById('sum-service');
    if (state.service) {
      const s = SERVICES[state.service];
      svcEl.innerHTML = `${t(s.nameKey)} <small>${t(s.subKey)} · $${s.price}</small>`;
      svcEl.classList.remove('empty');
    } else {
      svcEl.textContent = t('notSelected');
      svcEl.classList.add('empty');
    }

    const cityEl = document.getElementById('sum-city');
    cityEl.textContent = state.city ? 'Calgary, AB' : t('notSelected');
    cityEl.classList.toggle('empty', !state.city);

    const whenEl = document.getElementById('sum-when');
    if (state.date && state.time !== null) {
      whenEl.innerHTML = `${fmtDate(state.date,'short')} <small>${toAmPm(state.time)} — ${toAmPm(state.time+1)}</small>`;
      whenEl.classList.remove('empty');
    } else {
      whenEl.textContent = t('notSelected');
      whenEl.classList.add('empty');
    }

    const vehEl = document.getElementById('sum-vehicle');
    if (state.info.vMake || state.info.vModel) {
      vehEl.textContent = `${state.info.vYear || ''} ${state.info.vMake} ${state.info.vModel}`.trim();
      vehEl.classList.remove('empty');
    } else {
      vehEl.textContent = t('notEntered');
      vehEl.classList.add('empty');
    }

    updatePriceBlock();

    // Buttons
    const backBtn = document.getElementById('backBtn');
    const nextBtn = document.getElementById('nextBtn');
    const actions = document.getElementById('actions');

    if (state.step === 6) {
      actions.style.display = 'none';
      return;
    }
    actions.style.display = 'flex';

    backBtn.style.visibility = state.step === 1 ? 'hidden' : 'visible';
    backBtn.querySelector('span').textContent = t('back');
    nextBtn.disabled = !canContinue();

    const nextSpan = nextBtn.querySelector('span');
    if (state.step === 5) nextSpan.textContent = `${t('payBtn')} $${totalDue().toFixed(2)} →`;
    else if (state.step === 4) nextSpan.textContent = t('continueToPay');
    else nextSpan.textContent = t('continue');
  }

  function canContinue() {
    if (state.step === 1) return !!state.service;
    if (state.step === 2) return !!state.city;
    if (state.step === 3) return state.date && state.time !== null;
    if (state.step === 4) {
      const i = state.info;
      return i.name && i.address && i.phone && i.vMake && i.vModel && i.vYear;
    }
    if (state.step === 5) {
      const p = state.payment;
      return p.card.length >= 13 && p.exp.length >= 4 && p.cvc.length >= 3 && p.name;
    }
    return false;
  }

  // ============================================================
  //  STEP 3 — Date / Time
  // ============================================================
  let calCursor = new Date();

  function renderStep3(root) {
    root.innerHTML = `
      <div class="section-head">
        <div class="section-kicker">${t('step3Kicker')}</div>
        <h1 class="section-title">${t('step3Title1')} <em>${t('step3Title2')}</em></h1>

      </div>

        <div>

          </div>

        </div>
      </div>
    `;

    drawCalendar();
    drawSlots();

    document.getElementById('calPrev').onclick = () => {
      calCursor.setMonth(calCursor.getMonth() - 1);
      drawCalendar();
    };
    document.getElementById('calNext').onclick = () => {
      calCursor.setMonth(calCursor.getMonth() + 1);
      drawCalendar();
    };
  }

  function drawCalendar() {
    const monthEl = document.getElementById('calMonth');
    const grid = document.getElementById('calGrid');
    const year = calCursor.getFullYear();
    const month = calCursor.getMonth();

    monthEl.textContent = fmtMonthYear(calCursor);

    grid.innerHTML = '';

    // Week starts Monday
    const dowOrder = [1,2,3,4,5,6,0];
    const dowLabels = DAY_NAMES[state.lang].abbr;
    dowOrder.forEach(i => {
      const el = document.createElement('div');
      el.className = 'cal-dow';
      el.textContent = dowLabels[i];
      grid.appendChild(el);
    });

    const firstDay = new Date(year, month, 1);
    let lead = firstDay.getDay() - 1;
    if (lead < 0) lead = 6;

    for (let i = 0; i < lead; i++) {
      const el = document.createElement('div');
      el.className = 'cal-day empty';
      grid.appendChild(el);
    }

    const daysInMonth = new Date(year, month + 1, 0).getDate();
    const today = new Date();
    today.setHours(0,0,0,0);

    for (let d = 1; d <= daysInMonth; d++) {
      const date = new Date(year, month, d);
      const el = document.createElement('div');
      el.className = 'cal-day';
      el.textContent = d;

      const open = isOpenDay(date);
      if (open) el.classList.add('open-day');
      else el.classList.add('closed');

      if (date < today) el.classList.add('disabled');
      if (ymd(date) === ymd(today)) el.classList.add('today');
      if (state.date && ymd(state.date) === ymd(date)) el.classList.add('selected');

      el.addEventListener('click', () => {
        if (el.classList.contains('disabled') || el.classList.contains('empty') || el.classList.contains('closed')) return;
        state.date = date;
        state.time = null;
        drawCalendar();
        drawSlots();
        render();
      });
      grid.appendChild(el);
    }
  }

  function drawSlots() {
    const root = document.getElementById('slotsRoot');
    const dayLabel = document.getElementById('dayLabel');

    if (!state.date) {
      root.innerHTML = `<div class="no-date">${t('noDate')}</div>`;
      dayLabel.textContent = '';
      return;
    }

    dayLabel.textContent = fmtDate(state.date, 'short');

    const slots = slotsFor(state.date);
    const dayKey = ymd(state.date);
    const booked = state.bookings[dayKey] || new Set();
    const basePrice = getServicePrice() || 89;

    let html = `<div class="timeslot-grid">`;
    slots.forEach(h => {
      const isSel = state.time === h;
      const isTaken = booked.has(h);
      const cls = ['slot'];
      if (isSel) cls.push('selected');
      if (isTaken) cls.push('taken');

      const label = isTaken ? t('booked') : `60 min · $${basePrice}`;

      html += `<button class="${cls.join(' ')}" data-h="${h}" ${isTaken ? 'disabled' : ''}>
        ${toAmPm(h)}
        <small>${label}</small>
      </button>`;
    });
    html += `</div>`;

    html += `<div class="hours-note">⚙ ${t('hoursNote')}</div>`;

    root.innerHTML = html;

    root.querySelectorAll('.slot').forEach(btn => {
      btn.addEventListener('click', () => {
        if (btn.classList.contains('taken')) return;
        state.time = parseInt(btn.dataset.h, 10);
        drawSlots();
        render();
      });
    });
  }

  // ============================================================
  //  STEP 4 — Info
  // ============================================================
  function renderStep4(root) {
    root.innerHTML = `
      <div class="section-head">
        <div class="section-kicker">${t('step4Kicker')}</div>
        <h1 class="section-title">${t('step4Title1')} <em>${t('step4Title2')}</em></h1>
        <p class="section-sub">${t('step4Sub')}</p>
      </div>

      <div class="form-grid">
        <div class="field full">
          <label>${t('lblName')}</label>
          <input id="f-name" type="text" placeholder="${t('phName')}" value="${state.info.name}">
        </div>
        <div class="field full">
          <label>${t('lblAddress')}</label>
          <input id="f-address" type="text" placeholder="${t('phAddress')}" value="${state.info.address}">
        </div>
        <div class="field full">
          <label>${t('lblPhone')}</label>
          <input id="f-phone" type="tel" placeholder="${t('phPhone')}" value="${state.info.phone}">
        </div>

        <div class="vehicle-row">
          <div class="field">
            <label>${t('lblMake')}</label>
            <input id="f-make" type="text" placeholder="${t('phMake')}" value="${state.info.vMake}">
          </div>
          <div class="field">
            <label>${t('lblModel')}</label>
            <input id="f-model" type="text" placeholder="${t('phModel')}" value="${state.info.vModel}">
          </div>
          <div class="field">
            <label>${t('lblYear')}</label>
            <input id="f-year" type="text" placeholder="${t('phYear')}" maxlength="4" value="${state.info.vYear}">
          </div>
        </div>
      </div>

      <div class="requirement-banner" style="margin-top:32px">${t('reminder')}</div>
    `;

    const bind = (id, key) => {
      document.getElementById(id).addEventListener('input', e => {
        state.info[key] = e.target.value;
        const vehEl = document.getElementById('sum-vehicle');
        if (state.info.vMake || state.info.vModel) {
          vehEl.textContent = `${state.info.vYear || ''} ${state.info.vMake} ${state.info.vModel}`.trim();
          vehEl.classList.remove('empty');
        } else {
          vehEl.textContent = t('notEntered');
          vehEl.classList.add('empty');
        }
        document.getElementById('nextBtn').disabled = !canContinue();
      });
    };
    bind('f-name','name');
    bind('f-address','address');
    bind('f-phone','phone');
    bind('f-make','vMake');
    bind('f-model','vModel');
    bind('f-year','vYear');
  }

  // ============================================================
  //  STEP 5 — Payment
  // ============================================================
  function renderStep5(root) {
    root.innerHTML = `
      <div class="section-head">
        <div class="section-kicker">${t('step5Kicker')}</div>
        <h1 class="section-title">${t('step5Title1')} <em>${t('step5Title2')}</em></h1>
        <p class="section-sub">${t('step5Sub')}</p>
      </div>

      <div class="pay-wrap">
        <div class="pay-card">
          <div class="stripe-badge">${t('stripeBadge')}</div>

          <div class="field">
            <label>${t('lblCardName')}</label>
            <input id="p-name" type="text" placeholder="${t('phCardName')}" value="${state.payment.name}">
          </div>

          <div class="field" style="margin-top:16px">
            <label>${t('lblCardNum')}</label>
            <input id="p-card" type="text" placeholder="1234 5678 9012 3456" maxlength="19">
          </div>

          <div class="card-row">
            <div class="field">
              <label>${t('lblExp')}</label>
              <input id="p-exp" type="text" placeholder="MM / YY" maxlength="7">
            </div>
            <div class="field">
              <label>${t('lblCvc')}</label>
              <input id="p-cvc" type="text" placeholder="123" maxlength="4">
            </div>
          </div>
        </div>

        <div class="requirement-banner">${t('cancellation')}</div>
      </div>
    `;

    document.getElementById('p-name').addEventListener('input', e => { state.payment.name = e.target.value; document.getElementById('nextBtn').disabled = !canContinue(); });
    document.getElementById('p-card').addEventListener('input', e => {
      const raw = e.target.value.replace(/\D/g,'').slice(0,16);
      e.target.value = raw.replace(/(\d{4})(?=\d)/g,'$1 ');
      state.payment.card = raw;
      document.getElementById('nextBtn').disabled = !canContinue();
    });
    document.getElementById('p-exp').addEventListener('input', e => {
      let raw = e.target.value.replace(/\D/g,'').slice(0,4);
      e.target.value = raw.length >= 3 ? raw.slice(0,2)+' / '+raw.slice(2) : raw;
      state.payment.exp = raw;
      document.getElementById('nextBtn').disabled = !canContinue();
    });
    document.getElementById('p-cvc').addEventListener('input', e => {
      const v = e.target.value.replace(/\D/g,'').slice(0,4);
      e.target.value = v;
      state.payment.cvc = v;
      document.getElementById('nextBtn').disabled = !canContinue();
    });
  }

  // ============================================================
  //  STEP 6 — Success
  // ============================================================
  function renderSuccess(root) {
    const code = 'YYC-' + Math.random().toString(36).slice(2,8).toUpperCase();
    const dateStr = fmtDate(state.date, 'long');
    const timeStr = toAmPm(state.time);
    const msg = t('successMsg').replace('{date}', `<b style="color:var(--ink)">${dateStr}</b>`).replace('{time}', `<b style="color:var(--ink)">${timeStr}</b>`);
    root.innerHTML = `
      <div class="success-screen">
        <div class="success-mark">✓</div>
        <h1>${t('successTitle1')} <em>${t('successTitle2')}</em></h1>
        <p style="color:var(--ink-dim); max-width:480px; margin: 0 auto 18px">${msg}</p>
        <div class="confirm-code">${t('confirmLabel')} · ${code}</div>
      </div>
    `;
  }

  // ============================================================
  //  NAV
  // ============================================================
  document.getElementById('nextBtn').addEventListener('click', () => {
    if (!canContinue()) return;
    if (state.step === 5) {
      const key = ymd(state.date);
      if (!state.bookings[key]) state.bookings[key] = new Set();
      state.bookings[key].add(state.time);
      state.step = 6;
    } else {
      state.step++;
    }
    render();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  });

  document.getElementById('backBtn').addEventListener('click', () => {
    if (state.step > 1) state.step--;
    render();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  });

  // ============================================================
  //  LANGUAGE TOGGLE
  // ============================================================
  const langBtn = document.getElementById('langBtn');
  const langMenu = document.getElementById('langMenu');
  langBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    langMenu.classList.toggle('open');
  });
  document.addEventListener('click', () => langMenu.classList.remove('open'));
  langMenu.querySelectorAll('button').forEach(b => {
    b.addEventListener('click', (e) => {
      e.stopPropagation();
      setLanguage(b.dataset.lang);
      langMenu.classList.remove('open');
    });
  });

  // Initial render
  applyI18n();
  render();
</script>
</body>
</html>
